{% extends "admin/layout.html" %}

{% block header %}Message{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <div class="bg-white rounded-xl border border-grid p-6">
        <div class="flex items-start justify-between mb-6">
            <div>
                <h2 class="text-xl font-semibold mb-1">{{ message.subject }}</h2>
                <p class="text-sm text-secondary">From {{ message.name }} &lt;{{ message.email }}&gt;</p>
            </div>
            <form action="/admin/messages/{{ message.id }}/delete" method="POST"
                  onsubmit="return confirm('Delete this message?')">
                <button type="submit" aria-label="Delete message" class="p-2 text-red-500 hover:text-red-700 transition-colors focus-visible:ring-2 focus-visible:ring-red-500 focus-visible:ring-offset-2 rounded">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                </button>
            </form>
        </div>
        
        <div class="prose max-w-none">
            <p class="whitespace-pre-wrap">{{ message.message }}</p>
        </div>
        
        <div class="mt-6 pt-6 border-t border-grid flex items-center justify-between">
            <a href="/admin/messages" class="text-secondary hover:text-primary transition-colors inline-flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16l-4-4m0 0l4-4m-4 4h18"/>
                </svg>
                Back to Messages
            </a>
            
            <a href="mailto:{{ message.email }}?subject=Re: {{ message.subject }}"
               class="px-4 py-2 bg-accent text-white rounded-lg font-medium hover:bg-accent/90 transition-colors inline-flex items-center gap-2 focus-visible:ring-2 focus-visible:ring-accent focus-visible:ring-offset-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
                </svg>
                Reply via Email
            </a>
        </div>
    </div>
</div>
{% endblock %}
